spring.application.name=uniplan
server.port=8081

# Configuración del contexto de la aplicación para que todas las rutas comiencen con /api
server.servlet.context-path=/uniplan

# Carga variables desde el archivo .env en la raíz del proyecto
spring.config.import=optional:file:./.env[.properties]

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=require
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.thymeleaf.check-template-location=false

spring.data.mongodb.uri=${MONGODB_URI}

jwt.secret=${JWT_SECRET:uniplan-dev-secret-key-must-be-at-least-32-characters-long}
jwt.expiration=${JWT_EXPIRATION:86400000}
