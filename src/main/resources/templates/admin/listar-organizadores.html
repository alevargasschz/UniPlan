<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizadores - UniPlan</title>
    <link rel="stylesheet" th:href="@{/css/eventos/lista-eventos.css}">
    <style>
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-new {
            font-size: 12px;
            font-weight: 500;
            color: #111;
            text-decoration: none;
            background: #f5f4f0;
            border: 0.5px solid rgba(0,0,0,0.15);
            border-radius: 7px;
            padding: 6px 12px;
            white-space: nowrap;
        }
        .btn-new:hover { background: #eeede8; }
        .badge-profesor          { background: #eaf0fb; color: #1a4a8f; }
        .badge-lider_estudiantil { background: #f3eafc; color: #6a1a8f; }
        .badge-bienestar         { background: #eaf3de; color: #3b6d11; }
        .detail-row { font-size: 11px; color: #999; margin-top: 2px; }
    </style>
</head>
<body>
  <div class="nav">
    <span class="nav-brand">UniPlan</span>
    <div class="nav-links">
      <a th:href="@{/eventos}">Eventos</a>
      <a th:href="@{/reportes/estadisticas}">Estadísticas</a>
      <a th:href="@{/admin/organizadores}" style="color:#111; font-weight:500;">Organizadores</a>
      <a th:href="@{/logout}" class="logout">Cerrar Sesión</a>
    </div>
  </div>

  <div th:if="${success}" class="alert alert-success">
    <span th:text="${success}"></span>
  </div>
  <div th:if="${error}" class="alert alert-error">
    <span th:text="${error}"></span>
  </div>

  <div class="card">
    <div class="card-header">
      <h1>Organizadores</h1>
      <a th:href="@{/admin/organizadores/crear}" class="btn-new">+ Nuevo organizador</a>
    </div>
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Tipo</th>
          <th>Detalles</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="org : ${organizadores}">
          <td class="titulo" th:text="${org.nombre}"></td>
          <td class="secundario" th:text="${org.correo}"></td>
          <td>
            <span class="badge"
                  th:classappend="'badge-' + ${org.tipo.name().toLowerCase()}"
                  th:text="${org.tipo.name().replace('_',' ')}"></span>
          </td>
          <td class="secundario">
            <th:block th:if="${org.tipo.name() == 'PROFESOR'}">
              <div th:if="${org.datosEspecificos != null}">
                <span th:text="${org.datosEspecificos.facultad}"></span>
                <div class="detail-row"
                     th:text="${org.datosEspecificos.departamento + ' · ' + org.datosEspecificos.especializacion}"></div>
              </div>
            </th:block>
            <th:block th:if="${org.tipo.name() == 'LIDER_ESTUDIANTIL'}">
              <div th:if="${org.datosEspecificos != null}">
                <span th:text="${org.datosEspecificos.programa}"></span>
                <div class="detail-row"
                     th:text="'Sem. ' + ${org.datosEspecificos.semestre} + ' · ' + ${org.datosEspecificos.representacion}"></div>
              </div>
            </th:block>
            <th:block th:if="${org.tipo.name() == 'BIENESTAR'}">
              <div th:if="${org.datosEspecificos != null}">
                <span th:text="${org.datosEspecificos.areaAdministrativa}"></span>
                <div class="detail-row" th:text="${org.datosEspecificos.cargo}"></div>
              </div>
            </th:block>
          </td>
        </tr>
        <tr class="empty-row" th:if="${#lists.isEmpty(organizadores)}">
          <td colspan="4">No hay organizadores registrados aún.</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
