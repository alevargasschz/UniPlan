<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Top Eventos - UniPlan</title>
    <link rel="stylesheet" th:href="@{/css/eventos/lista-eventos.css}">
</head>
<body>

  <div class="nav">
    <span class="nav-brand">UniPlan</span>
    <div class="nav-links">
      <a th:href="@{/eventos}">Catálogo de Eventos</a>
      <a th:href="@{/eventos/mis-eventos}">Mis Eventos</a>
      <a th:href="@{/reportes/mis-inscripciones}">Mis Inscripciones</a>
      <a th:href="@{/logout}" class="logout">Cerrar Sesión</a>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
    <a class="ev-link" th:href="@{/reportes/estadisticas}" >Estadísticas</a>
      <h1>Top Eventos por Ocupación</h1>
    </div>
    <table>
      <thead>
        <tr>
          <th>Título</th>
          <th>Tipo</th>
          <th>Inscritos</th>
          <th>Máx. Asistentes</th>
          <th>% Ocupación</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="est : ${estadisticas}">
          <td class="titulo" th:text="${est.titulo}"></td>
          <td><span class="badge badge-tipo" th:text="${est.tipo}"></span></td>
          <td th:text="${est.totalInscritos}"></td>
          <td class="secundario" th:text="${est.maxAsistentes}"></td>
          <td th:text="${est.porcentajeOcupacion} + '%'"
              th:classappend="${est.porcentajeOcupacion ge 90} ? 'cupos-low'"></td>
        </tr>
        <tr class="empty-row" th:if="${#lists.isEmpty(estadisticas)}">
          <td colspan="5">No hay estadísticas disponibles.</td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
