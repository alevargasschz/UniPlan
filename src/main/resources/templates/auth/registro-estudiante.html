<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro Estudiante - UniPlan</title>
</head>
<body>
    <h1>Registro de Estudiante</h1>
    <div th:if="${error}" th:text="${error}" style="color: red;"></div>
    <div th:if="${success}" th:text="${success}" style="color: green;"></div>
    <form action="/public/auth/registro/estudiante" method="post" th:object="${request}">
        <div>
            <label for="correo">Correo:</label>
            <input type="text" id="correo" name="correo" th:field="*{correo}" required>
        </div>
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" th:field="*{nombre}" required>
        </div>
        <div>
            <label for="contrasena">Contraseña:</label>
            <input type="password" id="contrasena" name="contrasena" th:field="*{contrasena}" required>
        </div>
        <div>
            <label for="codigoEstudiantil">Código Estudiantil:</label>
            <input type="text" id="codigoEstudiantil" name="codigoEstudiantil" th:field="*{codigoEstudiantil}" required>
        </div>
        <button type="submit">Registrarse</button>
    </form>
    <p><a href="/public/auth/login">Volver al login</a></p>
</body>
</html>
