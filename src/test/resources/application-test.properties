server.port=8081

spring.config.import=

# PostgreSQL - H2 para tests
spring.datasource.url=jdbc:h2:mem:uniplan_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.check-template-location=false

# MongoDB Embedded para tests
de.flapdoodle.mongodb.embedded.version=6.0.12
spring.mongodb.port=0
management.health.mongodb.enabled=false

# Actuator endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
